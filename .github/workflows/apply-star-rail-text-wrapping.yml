name: Apply Star Rail text wrapping

on:
  push:
    branches:
      - fix/localized-time-units-0.18.0

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/localized-time-units-0.18.0
          fetch-depth: 0

      - name: Apply migration
        run: python .github/scripts/apply_star_rail_text_wrapping.py

      - name: Remove one-time migration files
        run: |
          rm .github/scripts/apply_star_rail_text_wrapping.py
          rm .github/workflows/apply-star-rail-text-wrapping.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Star Rail long title wrapping and spacing"
          git push

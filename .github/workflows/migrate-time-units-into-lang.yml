name: Migrate localized time units

on:
  push:
    branches:
      - fix/localized-time-units-0.18.0

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: fix/localized-time-units-0.18.0
          fetch-depth: 0

      - name: Apply corrected localization structure
        shell: bash
        run: |
          python3 .github/scripts/migrate_time_units.py
          git fetch origin main
          git show origin/main:.github/workflows/build.yml > .github/workflows/build.yml
          rm -f .github/workflows/migrate-time-units-into-lang.yml
          rm -f .github/scripts/migrate_time_units.py

      - name: Commit migration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move localized time units into Lang resources"
          git push origin HEAD:fix/localized-time-units-0.18.0

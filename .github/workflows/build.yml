name: Build

on:
  pull_request:
    branches: [ "main", "dev/*" ]

permissions:
  contents: write

jobs:
  remove_local_grit_resources:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout branch
      uses: actions/checkout@v5
      with:
        ref: fix/localized-time-units-0.18.0
        fetch-depth: 2

    - name: Remove local resources
      run: python .github/scripts/remove_grit_mechanic_lang_resources.py

    - name: Commit resource cleanup
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add src/Starward.Language/Lang*.resx
        git commit -m "Remove local Pure Fiction grit mechanic translations"
        git push

name: Build

on:
  pull_request:
    branches: [ "main", "dev/*" ]

permissions:
  contents: write

jobs:
  apply_uniform_header_spacing:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout branch
      uses: actions/checkout@v5
      with:
        ref: fix/localized-time-units-0.18.0
        fetch-depth: 0

    - name: Apply uniform header spacing
      run: python .github/scripts/apply_uniform_star_rail_header_spacing.py

    - name: Remove one-time migration script
      run: rm .github/scripts/apply_uniform_star_rail_header_spacing.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Make Star Rail card header spacing uniform"
        git push

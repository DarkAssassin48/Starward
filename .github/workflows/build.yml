name: Build

on:
  pull_request:
    branches: [ "main", "dev/*" ]

permissions:
  contents: write

jobs:
  apply_buff_names:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout branch
      uses: actions/checkout@v5
      with:
        ref: fix/localized-time-units-0.18.0
        fetch-depth: 2

    - name: Name lazy-loaded buff controls
      run: python .github/scripts/name_star_rail_buff_controls.py

    - name: Commit page changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add src/Starward/Features/GameRecord/StarRail/PureFictionPage.xaml
        git add src/Starward/Features/GameRecord/StarRail/ApocalypticShadowPage.xaml
        git commit -m "Name lazy-loaded Star Rail buff controls"
        git push

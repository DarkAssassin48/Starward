name: Build

on:
  pull_request:
    branches: [ "main", "dev/*" ]

jobs:
  diagnose:
    runs-on: windows-2025-vs2026
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Build with complete log
      shell: pwsh
      run: |
        New-Item -Path "build/Starward/" -Type Directory -Force
        & msbuild src/Starward.Launcher "-property:Configuration=Release;Platform=x64;OutDir=$(Resolve-Path "build/Starward/")" 2>&1 | Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        & dotnet publish src/Starward -c Release -r win-x64 -o "build/Starward/app-build.diag" -p:Platform=x64 -p:Version="0.0.1-build.diag" -p:DefineConstants=DONOT_CHECK_UPDATE 2>&1 | Tee-Object -FilePath build.log -Append
        exit $LASTEXITCODE

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: header-spacing-build-log
        path: build.log

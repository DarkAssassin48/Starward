name: Migrate time units into Lang resources

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Move units into existing Lang resources
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path('src/Starward.Language')
          units = {
              'Lang.resx': ('h', 'm', 's'),
              'Lang.de-DE.resx': ('h', 'm', 's'),
              'Lang.es-ES.resx': ('h', 'm', 's'),
              'Lang.it-IT.resx': ('h', 'm', 's'),
              'Lang.ja-JP.resx': ('時', '分', '秒'),
              'Lang.ko-KR.resx': ('시', '분', '초'),
              'Lang.ru-RU.resx': ('ч', 'м', 'с'),
              'Lang.th-TH.resx': ('ช', 'น', 'ว'),
              'Lang.vi-VN.resx': ('g', 'p', 's'),
              'Lang.zh-CN.resx': ('时', '分', '秒'),
              'Lang.zh-HK.resx': ('時', '分', '秒'),
              'Lang.zh-TW.resx': ('時', '分', '秒'),
          }

          keys = ('Common_HourShort', 'Common_MinuteShort', 'Common_SecondShort')
          for filename, values in units.items():
              path = root / filename
              text = path.read_text(encoding='utf-8-sig')
              for key in keys:
                  text = re.sub(
                      rf'\n?\s*<data name="{key}" xml:space="preserve">.*?</data>\s*',
                      '\n', text, flags=re.S)
              block = ''.join(
                  f'  <data name="{key}" xml:space="preserve">\n'
                  f'    <value>{value}</value>\n'
                  f'  </data>\n'
                  for key, value in zip(keys, values)
              )
              path.write_text(text.replace('</root>', block + '</root>'), encoding='utf-8')

          formatter = '''using System.Globalization;

namespace Starward.Language;


/// <summary>
/// Formats user-visible durations with localized one-character time-unit labels.
/// Unit labels are stored in the existing Lang*.resx language packs.
/// </summary>
public static class LocalizedTimeFormatter
{

    private static CultureInfo CurrentCulture => Lang.Culture ?? CultureInfo.CurrentUICulture;


    public static string FormatHoursMinutes(TimeSpan value)
    {
        value = Normalize(value);
        long hours = (long)Math.Floor(value.TotalHours);
        return Join(
            hours.ToString(CurrentCulture), GetUnit("Common_HourShort", "h"),
            value.Minutes.ToString(CurrentCulture), GetUnit("Common_MinuteShort", "m"));
    }


    public static string FormatMinutesSeconds(TimeSpan value, bool padSeconds = false)
    {
        value = Normalize(value);
        long minutes = (long)Math.Floor(value.TotalMinutes);
        string seconds = padSeconds
            ? value.Seconds.ToString("D2", CurrentCulture)
            : value.Seconds.ToString(CurrentCulture);
        return Join(
            minutes.ToString(CurrentCulture), GetUnit("Common_MinuteShort", "m"),
            seconds, GetUnit("Common_SecondShort", "s"));
    }


    public static string FormatHoursMinutesSeconds(TimeSpan value, bool padMinutesAndSeconds = false)
    {
        value = Normalize(value);
        long hours = (long)Math.Floor(value.TotalHours);
        string minutes = padMinutesAndSeconds
            ? value.Minutes.ToString("D2", CurrentCulture)
            : value.Minutes.ToString(CurrentCulture);
        string seconds = padMinutesAndSeconds
            ? value.Seconds.ToString("D2", CurrentCulture)
            : value.Seconds.ToString(CurrentCulture);
        return Join(
            hours.ToString(CurrentCulture), GetUnit("Common_HourShort", "h"),
            minutes, GetUnit("Common_MinuteShort", "m"),
            seconds, GetUnit("Common_SecondShort", "s"));
    }


    private static TimeSpan Normalize(TimeSpan value)
    {
        return value < TimeSpan.Zero ? TimeSpan.Zero : value;
    }


    private static string GetUnit(string name, string fallback)
    {
        return Lang.ResourceManager.GetString(name, CurrentCulture) ?? fallback;
    }


    private static string Join(params string[] parts)
    {
        return string.Join(' ', parts);
    }

}
'''
          (root / 'LocalizedTimeFormatter.cs').write_text(formatter, encoding='utf-8')

          replacements = {
              Path('src/Starward/Converters/TimeSpanToStringConverter.cs'):
                  ('LocalizedTimeFormatter.FormatHoursMinutes(time)',
                   'LocalizedTimeFormatter.FormatHoursMinutesSeconds(time)'),
              Path('src/Starward/Features/PlayTime/PlayTimeButton.xaml.cs'):
                  ('LocalizedTimeFormatter.FormatHoursMinutes(timeSpan)',
                   'LocalizedTimeFormatter.FormatHoursMinutesSeconds(timeSpan)'),
          }
          for path, (old, new) in replacements.items():
              text = path.read_text(encoding='utf-8-sig')
              if old not in text:
                  raise RuntimeError(f'Expected text not found in {path}: {old}')
              path.write_text(text.replace(old, new), encoding='utf-8')

          for path in root.glob('TimeUnits*.resx'):
              path.unlink()

          Path('.github/workflows/migrate-time-units-into-lang.yml').unlink(missing_ok=True)
          PY

          git fetch origin main
          git show origin/main:.github/workflows/build.yml > .github/workflows/build.yml

      - name: Commit corrected localization structure
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move localized time units into Lang resources"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

name: Fix Stygian localized seconds

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Replace hard-coded seconds
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/Starward/Features/GameRecord/Genshin/StygianOnslaughtPage.xaml')
          text = path.read_text(encoding='utf-8-sig')
          old = '<Run Text="s" />'
          new = '<Run Text="{x:Bind lang:Lang.Common_SecondShort}" />'
          count = text.count(old)
          if count != 3:
              raise RuntimeError(f'Expected exactly 3 hard-coded second units, found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

          git fetch origin main
          git show origin/main:.github/workflows/build.yml > .github/workflows/build.yml

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Starward/Features/GameRecord/Genshin/StygianOnslaughtPage.xaml .github/workflows/build.yml
          git commit -m "Localize Stygian Onslaught second units"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

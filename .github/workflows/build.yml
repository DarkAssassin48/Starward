name: Build

on:
  pull_request:
    branches: [ "main", "dev/*" ]

jobs:
  diagnose:
    runs-on: windows-2025-vs2026
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Build Release x64 and capture log
      shell: pwsh
      run: |
        New-Item -Path "build/Starward/" -Type Directory -Force
        & dotnet publish src/Starward -c Release -r win-x64 -o build/Starward/app-build -p:Platform=x64 -p:Version=0.0.1-diagnostic -p:DefineConstants=DONOT_CHECK_UPDATE *> build.log
        $exitCode = $LASTEXITCODE
        Get-Content build.log
        if ($exitCode -ne 0) { exit $exitCode }

    - name: Upload diagnostic log
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: mi18n-build-log
        path: build.log

name: Build

on:
  pull_request:
    branches: [ "main", "dev/*" ]

permissions:
  contents: write

jobs:
  apply_tierce_background:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout branch
      uses: actions/checkout@v5
      with:
        ref: fix/localized-time-units-0.18.0
        fetch-depth: 2

    - name: Apply background fix
      run: python .github/scripts/apply_apocalyptic_shadow_tierce_background.py

    - name: Restore workflow and remove migration script
      run: |
        git show HEAD^:.github/workflows/build.yml > .github/workflows/build.yml
        rm .github/scripts/apply_apocalyptic_shadow_tierce_background.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Stretch Apocalyptic Shadow tierce boss background"
        git push

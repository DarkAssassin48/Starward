name: Build

on:
  push:
    branches: [ "main", "dev/*" ]
  pull_request:
    branches: [ "main", "dev/*" ]

permissions:
  contents: write

jobs:

  apply-anomaly-card:
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/auto-game-record-refresh'
    runs-on: windows-2025-vs2026
    env:
      Configuration: Release
      Platform: x64

    steps:
    - name: Checkout feature branch
      uses: actions/checkout@v5
      with:
        ref: feature/auto-game-record-refresh
        fetch-depth: 0

    - name: Update Anomaly Arbitration card directly
      shell: pwsh
      run: |
        $path = 'src/Starward/Features/GameRecord/StarRail/ChallengePeakPage.xaml'
        $content = [IO.File]::ReadAllText($path)

        if ($content.Contains('<Grid Height="192"')) {
          $content = $content.Replace('<Grid Height="192"', '<Grid MinHeight="150"')
        }
        elseif (-not $content.Contains('<Grid MinHeight="150"')) {
          throw 'Anomaly Arbitration card height declaration was not found.'
        }

        $oldBuff = @'
                    <Border Grid.RowSpan="2"
                            Grid.Column="1"
                            Margin="8,8,12,8"
                            Padding="10,8"
                            VerticalAlignment="Center"
                            Background="Transparent"
                            Visibility="{x:Bind CurrentChallengePeakRecord.BossRecord, Converter={StaticResource ObjectToVisibilityConverter}}">
                        <StackPanel VerticalAlignment="Center" Spacing="6">
                            <!--  Buff  -->
                            <StackPanel Orientation="Horizontal" Spacing="8">
                                <sc:CachedImage Width="30"
                                                Height="30"
                                                VerticalAlignment="Center"
                                                Source="{x:Bind CurrentChallengePeakRecord.BossRecord.Buff.Icon}" />
                                <TextBlock MinWidth="0"
                                           VerticalAlignment="Center"
                                           FontWeight="SemiBold"
                                           MaxLines="2"
                                           Text="{x:Bind CurrentChallengePeakRecord.BossRecord.Buff.NameMi18n}"
                                           TextTrimming="CharacterEllipsis"
                                           TextWrapping="WrapWholeWords" />
                            </StackPanel>
                            <TextBlock Foreground="{ThemeResource TextFillColorSecondaryBrush}"
                                       MaxLines="4"
                                        Text="{x:Bind CurrentChallengePeakRecord.BossRecord.Buff.DescMi18n}"
                                       TextTrimming="CharacterEllipsis"
                                       TextWrapping="WrapWholeWords" />
                        </StackPanel>
                    </Border>
'@

        $newBuff = @'
                    <Button Grid.RowSpan="2"
                            Grid.Column="1"
                            Margin="8,8,12,8"
                            Padding="10,8"
                            HorizontalAlignment="Stretch"
                            VerticalAlignment="Center"
                            HorizontalContentAlignment="Stretch"
                            Background="Transparent"
                            BorderThickness="0"
                            Visibility="{x:Bind CurrentChallengePeakRecord.BossRecord, Converter={StaticResource ObjectToVisibilityConverter}}">
                        <Button.Flyout>
                            <Flyout Placement="BottomEdgeAlignedRight">
                                <ScrollViewer MaxWidth="360" MaxHeight="260">
                                    <TextBlock MaxWidth="340"
                                               Text="{x:Bind CurrentChallengePeakRecord.BossRecord.Buff.DescMi18n}"
                                               TextWrapping="WrapWholeWords" />
                                </ScrollViewer>
                            </Flyout>
                        </Button.Flyout>
                        <Grid ColumnSpacing="8">
                            <Grid.ColumnDefinitions>
                                <ColumnDefinition Width="Auto" />
                                <ColumnDefinition />
                            </Grid.ColumnDefinitions>
                            <sc:CachedImage Width="30"
                                            Height="30"
                                            VerticalAlignment="Center"
                                            Source="{x:Bind CurrentChallengePeakRecord.BossRecord.Buff.Icon}" />
                            <TextBlock Grid.Column="1"
                                       MinWidth="0"
                                       VerticalAlignment="Center"
                                       FontWeight="SemiBold"
                                       MaxLines="2"
                                       Text="{x:Bind CurrentChallengePeakRecord.BossRecord.Buff.NameMi18n}"
                                       TextTrimming="CharacterEllipsis"
                                       TextWrapping="WrapWholeWords" />
                        </Grid>
                    </Button>
'@

        if ($content.Contains($oldBuff)) {
          $content = $content.Replace($oldBuff, $newBuff)
        }
        elseif (-not $content.Contains('<Button.Flyout>')) {
          throw 'Existing Anomaly Arbitration buff panel was not found.'
        }

        [IO.File]::WriteAllText($path, $content, [Text.UTF8Encoding]::new($false))

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Verify Release x64
      shell: pwsh
      run: |
        New-Item -Path 'build/Starward' -ItemType Directory -Force | Out-Null
        msbuild src/Starward.Launcher "-property:Configuration=$env:Configuration;Platform=$env:Platform;OutDir=$((Resolve-Path 'build/Starward').Path)"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        dotnet publish src/Starward -c $env:Configuration -r "win-$env:Platform" -o 'build/Starward/app-0.17.4-autorefresh-anomaly-buff-button-test' -p:Platform=$env:Platform -p:Version='0.17.4-autorefresh-anomaly-buff-button-test' -p:DefineConstants=DONOT_CHECK_UPDATE
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        Set-Content 'build/Starward/version.ini' -Value 'version=0.17.4-autorefresh-anomaly-buff-button-test'

    - name: Commit direct source change
      shell: pwsh
      run: |
        if (git status --porcelain -- 'src/Starward/Features/GameRecord/StarRail/ChallengePeakPage.xaml') {
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/Starward/Features/GameRecord/StarRail/ChallengePeakPage.xaml
          git commit -m 'Refine Anomaly Arbitration buff card interaction'
          git push origin HEAD:feature/auto-game-record-refresh
        }

    - name: Upload verified build
      uses: actions/upload-artifact@v7
      with:
        name: Starward_AutoRefresh_AnomalyBuffButton_Test_x64
        path: build/Starward/
        if-no-files-found: error
        compression-level: 6

  build:
    runs-on: windows-2025-vs2026
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64, arm64]

    env:
      Configuration: ${{ matrix.configuration }}
      Platform: ${{ matrix.platform }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: SHA
      id: sha
      run: echo "sha=$("${{ github.sha }}".SubString(0, 7))" >> $env:GITHUB_OUTPUT

    - name: Build
      run: |
        $sha = "${{ steps.sha.outputs.sha }}"
        New-Item -Path "build/Starward/" -Type Directory
        msbuild src/Starward.Launcher "-property:Configuration=$env:Configuration;Platform=$env:Platform;OutDir=$(Resolve-Path "build/Starward/")"
        dotnet publish src/Starward -c $env:Configuration -r "win-$env:Platform" -o "build/Starward/app-build.$sha" -p:Platform=$env:Platform -p:Version="0.0.1-build.$sha" -p:DefineConstants=DONOT_CHECK_UPDATE
        Set-Content "build/Starward/version.ini" -Value "version=build.$sha"

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: Starward_${{ matrix.configuration }}_${{ matrix.platform }}_${{ steps.sha.outputs.sha }}
        path: build/Starward/

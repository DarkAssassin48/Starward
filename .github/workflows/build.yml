name: Fix Stygian second unit binding

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Use formatter property in XAML
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          xaml = Path('src/Starward/Features/GameRecord/Genshin/StygianOnslaughtPage.xaml')
          text = xaml.read_text(encoding='utf-8-sig')
          old = '{x:Bind lang:Lang.Common_SecondShort}'
          new = '{x:Bind lang:LocalizedTimeFormatter.SecondUnit}'
          count = text.count(old)
          if count != 3:
              raise RuntimeError(f'Expected exactly 3 direct Lang bindings, found {count}')
          xaml.write_text(text.replace(old, new), encoding='utf-8')

          formatter = Path('src/Starward.Language/LocalizedTimeFormatter.cs')
          text = formatter.read_text(encoding='utf-8-sig')
          anchor = '    private static CultureInfo CurrentCulture => Lang.Culture ?? CultureInfo.CurrentUICulture;\n'
          addition = '\n\n    public static string SecondUnit => GetUnit("Common_SecondShort", "s");\n'
          if 'public static string SecondUnit' not in text:
              if anchor not in text:
                  raise RuntimeError('Formatter insertion point not found')
              text = text.replace(anchor, anchor + addition, 1)
          formatter.write_text(text, encoding='utf-8')
          PY

          git fetch origin main
          git show origin/main:.github/workflows/build.yml > .github/workflows/build.yml

      - name: Commit corrected binding
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Starward/Features/GameRecord/Genshin/StygianOnslaughtPage.xaml src/Starward.Language/LocalizedTimeFormatter.cs .github/workflows/build.yml
          git commit -m "Use localized formatter property for Stygian seconds"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

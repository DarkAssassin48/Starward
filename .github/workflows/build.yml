name: Build

on:
  pull_request:
    branches: [ "main", "dev/*" ]

permissions:
  contents: write

jobs:
  apply_grit_mechanic:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout branch
      uses: actions/checkout@v5
      with:
        ref: fix/localized-time-units-0.18.0
        fetch-depth: 2

    - name: Apply grit mechanic migration
      run: python .github/scripts/add_pure_fiction_grit_mechanic.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add src/Starward/Features/GameRecord/StarRail/PureFictionPage.xaml
        git add src/Starward.Language/Lang*.resx
        git commit -m "Show Pure Fiction grit mechanic in buff flyouts"
        git push

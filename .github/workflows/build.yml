name: Build

on:
  pull_request:
    branches: [ "main", "dev/*" ]

permissions:
  contents: write

jobs:
  store_pure_fiction_mechanism_title:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout branch
      uses: actions/checkout@v5
      with:
        ref: fix/localized-time-units-0.18.0
        fetch-depth: 2

    - name: Apply record migration
      run: python .github/scripts/store_pure_fiction_mechanism_title.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add src/Starward/Features/GameRecord/GameRecordService.cs
        git add src/Starward/Features/GameRecord/StarRail/PureFictionPage.xaml
        git commit -m "Store Pure Fiction mechanism title with records"
        git push

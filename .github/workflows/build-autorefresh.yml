name: Build Starward AutoRefresh Test

on:
  push:
    branches:
      - feature/auto-game-record-refresh
    paths:
      - '.github/workflows/build-autorefresh.yml'
      - '.github/patches/auto-game-record-refresh.patch.gz.b64'
      - 'src/Starward/Features/Setting/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/build-autorefresh.yml'
      - '.github/patches/auto-game-record-refresh.patch.gz.b64'
      - 'src/Starward/Features/Setting/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-x64:
    runs-on: windows-2025-vs2026
    env:
      Configuration: Release
      Platform: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Decode and apply AutoRefresh patch
        shell: pwsh
        run: |
          $encoded = Get-Content '.github/patches/auto-game-record-refresh.patch.gz.b64' -Raw
          [IO.File]::WriteAllBytes('auto-game-record-refresh.patch.gz', [Convert]::FromBase64String($encoded.Trim()))
          gzip -d -f auto-game-record-refresh.patch.gz
          git apply --check auto-game-record-refresh.patch
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git apply auto-game-record-refresh.patch
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build launcher and app
        shell: pwsh
        run: |
          $version = '0.17.4-autorefresh-settings-test'
          New-Item -Path 'build/Starward' -ItemType Directory -Force | Out-Null

          msbuild src/Starward.Launcher "-property:Configuration=$env:Configuration;Platform=$env:Platform;OutDir=$((Resolve-Path 'build/Starward').Path)"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          dotnet publish src/Starward `
            -c $env:Configuration `
            -r "win-$env:Platform" `
            -o "build/Starward/app-$version" `
            -p:Platform=$env:Platform `
            -p:Version=$version `
            -p:DefineConstants=DONOT_CHECK_UPDATE
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Set-Content 'build/Starward/version.ini' -Value "version=$version"
          Remove-Item 'build/Starward/Starward.pdb' -Force -ErrorAction SilentlyContinue

      - name: Add build information
        shell: pwsh
        run: |
          @"
          Starward AutoRefresh settings test build
          Base version: 0.17.4
          Architecture: x64
          Commit: $env:GITHUB_SHA
          Built: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss K')
          Official update check is disabled for this test build.
          "@ | Set-Content 'build/Starward/AUTOREFRESH_TEST_BUILD.txt' -Encoding UTF8

      - name: Upload portable build
        uses: actions/upload-artifact@v7
        with:
          name: Starward_AutoRefresh_Settings_Test_x64
          path: build/Starward/
          if-no-files-found: error
          compression-level: 6

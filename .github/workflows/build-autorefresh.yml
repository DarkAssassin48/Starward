name: Build Starward AutoRefresh Test

on:
  push:
    branches:
      - feature/auto-game-record-refresh
    paths:
      - '.github/workflows/build-autorefresh.yml'
      - '.github/patches/auto-game-record-refresh.patch.gz.b64'
      - '.github/patches/autorefresh-settings-page.patch.gz.b64'
      - '.github/patches/autorefresh-scheduling-monthly-ui-fixes.patch.gz.b64'
      - '.github/scripts/apply-ui-l10n-fixes.ps1'
      - '.github/scripts/apply-apocalyptic-crash-combobox-style-fix.ps1'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/build-autorefresh.yml'
      - '.github/patches/auto-game-record-refresh.patch.gz.b64'
      - '.github/patches/autorefresh-settings-page.patch.gz.b64'
      - '.github/patches/autorefresh-scheduling-monthly-ui-fixes.patch.gz.b64'
      - '.github/scripts/apply-ui-l10n-fixes.ps1'
      - '.github/scripts/apply-apocalyptic-crash-combobox-style-fix.ps1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-x64:
    runs-on: windows-2025-vs2026
    env:
      Configuration: Release
      Platform: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          show-progress: false

      - name: Prepare diagnostic folder
        shell: pwsh
        run: New-Item -Path 'build/logs' -ItemType Directory -Force | Out-Null

      - name: Apply AutoRefresh core patch
        shell: pwsh
        run: |
          $encoded = Get-Content '.github/patches/auto-game-record-refresh.patch.gz.b64' -Raw
          [IO.File]::WriteAllBytes('auto-game-record-refresh.patch.gz', [Convert]::FromBase64String($encoded.Trim()))
          gzip -d -f auto-game-record-refresh.patch.gz
          git apply --check auto-game-record-refresh.patch
          git apply auto-game-record-refresh.patch

      - name: Apply AutoRefresh settings page patch
        shell: pwsh
        run: |
          $encoded = Get-Content '.github/patches/autorefresh-settings-page.patch.gz.b64' -Raw
          [IO.File]::WriteAllBytes('autorefresh-settings-page.patch.gz', [Convert]::FromBase64String($encoded.Trim()))
          gzip -d -f autorefresh-settings-page.patch.gz
          git apply --check autorefresh-settings-page.patch
          git apply autorefresh-settings-page.patch

      - name: Apply scheduling, monthly details, and UI fixes patch
        shell: pwsh
        run: |
          $encoded = Get-Content '.github/patches/autorefresh-scheduling-monthly-ui-fixes.patch.gz.b64' -Raw
          [IO.File]::WriteAllBytes('autorefresh-scheduling-monthly-ui-fixes.patch.gz', [Convert]::FromBase64String($encoded.Trim()))
          gzip -d -f autorefresh-scheduling-monthly-ui-fixes.patch.gz

          & git apply --check --verbose autorefresh-scheduling-monthly-ui-fixes.patch *> 'build/logs/patch-check.log'
          $checkExit = $LASTEXITCODE
          Get-Content 'build/logs/patch-check.log'
          if ($checkExit -ne 0) { exit $checkExit }

          & git apply --verbose autorefresh-scheduling-monthly-ui-fixes.patch *> 'build/logs/patch-apply.log'
          $applyExit = $LASTEXITCODE
          Get-Content 'build/logs/patch-apply.log'
          if ($applyExit -ne 0) { exit $applyExit }

      - name: Apply settings, Apocalyptic Shadow, and localization fixes
        shell: pwsh
        run: |
          & '.github/scripts/apply-ui-l10n-fixes.ps1' *> 'build/logs/ui-l10n-fixes.log'
          $fixExit = $LASTEXITCODE
          Get-Content 'build/logs/ui-l10n-fixes.log'
          if ($fixExit -ne 0) { exit $fixExit }

      - name: Apply Apocalyptic Shadow crash, layout, and ComboBox style fixes
        shell: pwsh
        run: |
          & '.github/scripts/apply-apocalyptic-crash-combobox-style-fix.ps1' *> 'build/logs/crash-style-fixes.log'
          $fixExit = $LASTEXITCODE
          Get-Content 'build/logs/crash-style-fixes.log'
          if ($fixExit -ne 0) { exit $fixExit }

      - name: Install .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build launcher and app
        shell: pwsh
        run: |
          $version = '0.17.4-autorefresh-two-team-layout-test'
          New-Item -Path 'build/Starward' -ItemType Directory -Force | Out-Null

          & msbuild src/Starward.Launcher "-property:Configuration=$env:Configuration;Platform=$env:Platform;OutDir=$((Resolve-Path 'build/Starward').Path)" *> 'build/logs/launcher.log'
          $launcherExit = $LASTEXITCODE
          if ($launcherExit -ne 0) {
            Write-Host '=== LAUNCHER BUILD ERRORS ==='
            Get-Content 'build/logs/launcher.log' | Select-String -Pattern '(?i)error|failed' | Select-Object -Last 100 | ForEach-Object { Write-Host $_.Line }
            exit $launcherExit
          }
          Write-Host 'Launcher build succeeded.'

          & dotnet publish src/Starward `
            -c $env:Configuration `
            -r "win-$env:Platform" `
            -o "build/Starward/app-$version" `
            -p:Platform=$env:Platform `
            -p:Version=$version `
            -p:DefineConstants=DONOT_CHECK_UPDATE `
            -v:minimal *> 'build/logs/publish.log'
          $publishExit = $LASTEXITCODE
          if ($publishExit -ne 0) {
            Write-Host '=== APPLICATION BUILD ERRORS ==='
            Get-Content 'build/logs/publish.log' | Select-String -Pattern '(?i)error|failed|exception' | Select-Object -Last 120 | ForEach-Object { Write-Host $_.Line }
            exit $publishExit
          }
          Write-Host 'Application build succeeded.'

          Set-Content 'build/Starward/version.ini' -Value "version=$version"
          Remove-Item 'build/Starward/Starward.pdb' -Force -ErrorAction SilentlyContinue

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Starward_AutoRefresh_Compile_Logs
          path: build/logs/
          if-no-files-found: ignore
          compression-level: 6

      - name: Add build information
        shell: pwsh
        run: |
          @"
          Starward AutoRefresh two-team Apocalyptic Shadow layout test
          Base version: 0.17.4
          Architecture: x64
          Commit: $env:GITHUB_SHA
          Built: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss K')
          Apocalyptic Shadow uses a dedicated two-column layout for two teams.
          The separate three-team layout is unchanged.
          Apocalyptic Shadow no longer mutates a removed third column.
          HoYoLAB schedule ComboBoxes match the language selector styling.
          Playtime duration format is loaded from localization resources.
          Official update check is disabled for this test build.
          "@ | Set-Content 'build/Starward/AUTOREFRESH_TEST_BUILD.txt' -Encoding UTF8

      - name: Upload portable build
        uses: actions/upload-artifact@v7
        with:
          name: Starward_AutoRefresh_TwoTeamLayout_Test_x64
          path: build/Starward/
          if-no-files-found: error
          compression-level: 6

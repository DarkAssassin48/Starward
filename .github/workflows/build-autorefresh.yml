name: Build Starward AutoRefresh Direct

on:
  push:
    branches:
      - feature/auto-game-record-refresh
    paths:
      - 'src/**'
      - '.github/workflows/build-autorefresh.yml'
      - 'global.json'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/build-autorefresh.yml'
      - 'global.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-x64:
    runs-on: windows-2025-vs2026
    env:
      Configuration: Release
      Platform: x64

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v5
        with:
          ref: feature/auto-game-record-refresh
          fetch-depth: 0
          show-progress: false

      - name: Set Anomaly Arbitration card height to 200
        shell: pwsh
        run: |
          $path = 'src/Starward/Features/GameRecord/StarRail/ChallengePeakPage.xaml'
          $content = [IO.File]::ReadAllText($path)
          $old = '<Grid Height="192"'
          $new = '<Grid Height="200"'

          if ($content.Contains($old)) {
            $content = $content.Replace($old, $new)
            [IO.File]::WriteAllText($path, $content, [Text.UTF8Encoding]::new($false))
          }
          elseif (-not $content.Contains($new)) {
            throw 'Anomaly Arbitration card height declaration was not found.'
          }

      - name: Install .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build launcher and app directly from source
        shell: pwsh
        run: |
          $version = '0.17.4-autorefresh-anomaly-height200-test'
          New-Item -Path 'build/Starward' -ItemType Directory -Force | Out-Null

          msbuild src/Starward.Launcher "-property:Configuration=$env:Configuration;Platform=$env:Platform;OutDir=$((Resolve-Path 'build/Starward').Path)"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          dotnet publish src/Starward `
            -c $env:Configuration `
            -r "win-$env:Platform" `
            -o "build/Starward/app-$version" `
            -p:Platform=$env:Platform `
            -p:Version=$version `
            -p:DefineConstants=DONOT_CHECK_UPDATE `
            -v:minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Set-Content 'build/Starward/version.ini' -Value "version=$version"
          Remove-Item 'build/Starward/Starward.pdb' -Force -ErrorAction SilentlyContinue

      - name: Commit direct XAML change
        shell: pwsh
        run: |
          if (git status --porcelain -- 'src/Starward/Features/GameRecord/StarRail/ChallengePeakPage.xaml') {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add src/Starward/Features/GameRecord/StarRail/ChallengePeakPage.xaml
            git commit -m 'Set Anomaly Arbitration card height to 200'
            git push origin HEAD:feature/auto-game-record-refresh
          }

      - name: Add build information
        shell: pwsh
        run: |
          @"
          Starward AutoRefresh Anomaly Arbitration height 200 test
          Base version: 0.17.4
          Architecture: x64
          Commit: $env:GITHUB_SHA
          Built: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss K')
          Anomaly Arbitration card uses fixed Height=200.
          The transparent buff button remains aligned to the bottom of the boss image.
          Official update check is disabled for this test build.
          "@ | Set-Content 'build/Starward/AUTOREFRESH_TEST_BUILD.txt' -Encoding UTF8

      - name: Upload portable build
        uses: actions/upload-artifact@v7
        with:
          name: Starward_AutoRefresh_AnomalyHeight200_Test_x64
          path: build/Starward/
          if-no-files-found: error
          compression-level: 6
